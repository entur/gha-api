name: PostHog Capture
description: Send a workflow analytics event to PostHog

inputs:
  workflow_name:
    description: "Name of the workflow. Used as the event name: {workflow_name}_executed"
    required: true
  workflow_inputs:
    description: "Workflow inputs as a JSON string (e.g. toJSON(inputs))"
    required: false
    default: "{}"
  api_key:
    description: "PostHog project API key"
    required: true

runs:
  using: composite
  steps:
    - name: Send event
      shell: bash
      env:
        POSTHOG_API_KEY:  ${{ inputs.api_key }}
        WORKFLOW_NAME:    ${{ inputs.workflow_name }}
        WORKFLOW_INPUTS:  ${{ inputs.workflow_inputs }}
      run: |
        set +e
        set +o pipefail

        # Resolve version by finding this reusable workflow's SHA in the caller's run,
        # then fetching version.txt at that SHA from entur/gha-api.
        # (GITHUB_WORKFLOW_REF is the caller's ref, not the reusable workflow's ref)
        GHA_SHA=$(curl -sf \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
          | jq -r '(.referenced_workflows // [])[] | select(.path | startswith("entur/gha-api/")) | .sha' \
          | head -1 || echo "")

        WORKFLOW_VERSION=""
        if [ -n "$GHA_SHA" ]; then
          WORKFLOW_VERSION=$(curl -sf "https://raw.githubusercontent.com/entur/gha-api/${GHA_SHA}/version.txt" || echo "")
        fi

        payload=$(jq -n \
          --arg     api_key  "$POSTHOG_API_KEY" \
          --arg     repo     "$GITHUB_REPOSITORY" \
          --arg     name     "$WORKFLOW_NAME" \
          --arg     version  "$WORKFLOW_VERSION" \
          --argjson inputs   "$WORKFLOW_INPUTS" \
          --arg     event    "$GITHUB_EVENT_NAME" \
          --arg     run_id   "$GITHUB_RUN_ID" \
          '{
            api_key:     $api_key,
            event:       ($name + "_executed"),
            distinct_id: $repo,
            properties: (
              {
                workflow_name:    $name,
                workflow_version: $version,
                repository:       $repo,
                event_name:       $event,
                run_id:           $run_id
              }
              + ($inputs | with_entries(.key = ("input_" + .key)))
            )
          }')

        curl -s --max-time 5 \
          -H "Content-Type: application/json" \
          -d "$payload" \
          https://eu.posthog.com/capture/ || true
