name: Entur/API/Lint

on:
  workflow_call:
    inputs:
      path:
        description: "Path to OpenAPI specfication"
        type: string
      artifact:
        description: "Artifact containing the OpenAPI specification."
        type: string
      upload_to_bucket:
        description: "If true, will upload the spec to a GCS bucket for analytics."
        type: boolean
        default: true
      fail_threshold:
        description: "The threshold to fail the build. Accepted values: warn, error, never"
        type: string
        default: "never"

env:
  REDOCLY_VERSION: "2.25.1"
  SPECTRAL_VERSION: "6.15.0"

jobs:
  evaluate-input:
    name: Evaluate input
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      spec_path: ${{ steps.resolve-spec-path.outputs.spec_path }}
    env:
      GHA_API_FAIL_THRESHOLD: ${{ inputs.fail_threshold }}
      GHA_API_ARTIFACT:       ${{ inputs.artifact }}
      GHA_API_PATH:           ${{ inputs.path }}
    steps:
      - name: Checkout repository (if spec provided)
        if: ${{ inputs.artifact == '' }}
        uses: actions/checkout@v6
      - name: Download artifact (if artifact provided)
        if: ${{ inputs.artifact != '' }}
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ inputs.artifact }}
          path: /tmp/artifacts
      - name: Validate
        run: |
          set -o errexit  #Exits immediately if any command fails (returns non-zero)
          set -o nounset  #Treats unset variables as errors          
          set -o pipefail #Makes a pipeline fail if any command in it fails (not just the last)
          
          # Validate fail_threshold
          case "$GHA_API_FAIL_THRESHOLD" in
            warn|error|never) 
              ;;  # OK
            *) 
              echo "::error::fail_threshold must be one of: warn, error, never"
              exit 1
              ;;
          esac
      - name: Resolve spec path
        id: resolve-spec-path
        run: |
          # Resolve spec path based on inputs
          if [ -n "$GHA_API_ARTIFACT" ]; then
            if [ -n "$GHA_API_PATH" ]; then
              spec_path="/tmp/artifacts/$GHA_API_PATH"
            else
              spec_path="/tmp/artifacts/openapi.yaml"
            fi
          else
            if [ -n "$GHA_API_PATH" ]; then
              spec_path="$GHA_API_PATH"
            else
              spec_path="specs/openapi.yaml"
            fi
          fi
          
          echo "Path to spec resolved to $spec_path"
          
          if [ ! -f $spec_path ]; then
            echo "File $spec_path not found."
            exit 1
          fi
          
          echo "spec_path=$spec_path" >> "$GITHUB_OUTPUT"
      - name: Send analytics
        if: always()
        uses: ./.github/actions/posthog
        with:
          workflow_name:   lint
          workflow_inputs: ${{ toJSON(inputs) }}
          api_key:         "phc_yhR5iXxjC2n6J7tqznFQURld147kruAy4HuYgjbyEyk"
  lint:
    name: OpenAPI Lint
    runs-on: ubuntu-latest
    needs: evaluate-input
    permissions:
      contents: read
    steps:
      - name: Checkout repository (if spec provided)
        if: ${{ inputs.artifact == '' }}
        uses: actions/checkout@v6
      - name: Download artifact (if artifact provided)
        if: ${{ inputs.artifact != '' }}
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ inputs.artifact }}
          path: /tmp/artifacts
      - name: Checkout linting rulesets
        uses: actions/checkout@v6
        with:
          repository: entur/api-guidelines
          ref: v3.0.0
          path: rulesets
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .spectral*.yml
            functions/*.js
      - name: Lint OpenAPI
        shell: bash
        env:
          GHA_API_PATH:           ${{ needs.evaluate-input.outputs.spec_path }}
          GHA_API_FAIL_THRESHOLD: ${{ inputs.fail_threshold }}
        run: |
          set -o errexit
          set -o nounset
          set -o pipefail

          shopt -s globstar

          annotations=$(mktemp)
          markdown=$(mktemp)
          #Capture return code in $rc, and do not fail workflow.
          npx --ignore-scripts @stoplight/spectral-cli@$SPECTRAL_VERSION lint "$GHA_API_PATH" --ruleset "rulesets/.spectral.yml" --show-documentation-url -F hint -f github-actions -o.github-actions "$annotations" -f markdown -o.markdown="$markdown" && rc=$? || rc=$?
          
          #Return code 2 means that spectral command failed to run (not linting errors), so fail workflow.
          if [ "$rc" -eq 2 ]; then
            echo "::error::Spectral execution error (exit code $rc)."
            exit $rc
          fi

          if [ "$rc" -eq 1 ]; then
            cat $annotations
            cat $markdown >> $GITHUB_STEP_SUMMARY
            echo

            if [ "$GHA_API_FAIL_THRESHOLD" != "never" ]; then
              npx --ignore-scripts @stoplight/spectral-cli@$SPECTRAL_VERSION lint "$GHA_API_PATH" --ruleset "rulesets/.spectral.yml" -o "/dev/null" -f json -F "$GHA_API_FAIL_THRESHOLD" && rc=$? || rc=$?

              if [ "$rc" -ne 0 ]; then
                echo "::error::Found linting problems. Failing workflow."
                exit $rc
              fi
            fi
          fi


  upload-to-bucket:
    name: Upload to bucket
    if: |
      inputs.upload_to_bucket == true
      && (
        (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) ||
        (github.event_name == 'pull_request' && 
         github.event.action == 'closed' && 
         github.event.pull_request.merged == true && 
         github.event.pull_request.base.ref == github.event.repository.default_branch)
      )
    needs: evaluate-input
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (if spec provided)
        if: ${{ inputs.artifact == '' }}
        uses: actions/checkout@v6
      - name: Download artifact (if artifact provided)
        if: ${{ inputs.artifact != '' }}
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ inputs.artifact }}
          path: /tmp/artifacts
      - name: Check ENTUR_API_DATA_SA secret exists
        env:
          ENTUR_API_DATA_SA: ${{ secrets.ENTUR_API_DATA_SA }}
          REPO_VISIBILITY: ${{ github.event.repository.visibility }}
        run: |
          if [ -z "$ENTUR_API_DATA_SA" ]; then
            if [ "$REPO_VISIBILITY" = "public" ]; then
              echo "::error::Upload to bucket will not work out of the box for public repositories, due to the \
          repository secret ENTUR_API_DATA_SA not being available. Ask Team Plattform to add it."
            else
              echo "::error::The repository secret ENTUR_API_DATA_SA is not available. Please ensure it is configured."
            fi
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: "${{ secrets.ENTUR_API_DATA_SA }}"
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      - name: Bundle spec
        env:
          GHA_API_PATH: ${{ needs.evaluate-input.outputs.spec_path }}
        run: |
          set -o errexit
          set -o nounset
          set -o pipefail
          shopt -s globstar

          filename=$(basename $GHA_API_PATH)
          mkdir -p /tmp/specs
          npx @redocly/cli@$REDOCLY_VERSION bundle -o /tmp/specs/$filename $GHA_API_PATH

          cp $GHA_API_PATH /tmp/specs
      - name: Upload specs to GCS
        run: |
          set -o errexit
          set -o nounset
          set -o pipefail
          echo "Starting to sync files in /tmp/specs/ to GCS Bucket to path /${GITHUB_REPOSITORY#*/}"
          gcloud storage rsync /tmp/specs/ "gs://ent-gcs-api-specs-prd-001/${GITHUB_REPOSITORY#*/}"
