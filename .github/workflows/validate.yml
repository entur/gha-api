name: Entur/API/Validate

on:
  workflow_call:
    inputs:
      path:
        description: "Path to OpenAPI specfication"
        type: string
      artifact:
        description: "Artifact containing the OpenAPI specification."
        type: string

env:
  REDOCLY: npx --ignore-scripts @redocly/cli@2.30.6
  # Need to force spectral-rulesets version to work around https://github.com/stoplightio/spectral/issues/2959
  SPECTRAL: npx --ignore-scripts -p @stoplight/spectral-cli@6.16.0 -p @stoplight/spectral-rulesets@1.22.2 spectral
  NPM_CONFIG_IGNORE_SCRIPTS: true
  NPM_CONFIG_MIN_RELEASE_AGE: 4

jobs:
  validate-spec:
    name: OpenAPI Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    env:
      GHA_API_ARTIFACT:       ${{ inputs.artifact }}
      GHA_API_PATH:           ${{ inputs.path }}
      CLOUD_RUN_ENDPOINT:     https://europe-west1-ent-apidata-prd.cloudfunctions.net/publish-spec
    steps:
      - name: Checkout repository (if spec provided)
        if: ${{ inputs.artifact == '' }}
        uses: actions/checkout@v7
      - name: Download artifact (if artifact provided)
        if: ${{ inputs.artifact != '' }}
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ inputs.artifact }}
          path: /tmp/artifacts
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Resolve spec path
        id: resolve-spec-path
        run: |
          # Resolve spec path based on inputs
          if [ -n "$GHA_API_ARTIFACT" ]; then
            if [ -n "$GHA_API_PATH" ]; then
              spec_path="/tmp/artifacts/$GHA_API_PATH"
            else
              spec_path="/tmp/artifacts/openapi.yaml"
            fi
          else
            if [ -n "$GHA_API_PATH" ]; then
              spec_path="$GHA_API_PATH"
            else
              spec_path="specs/openapi.yaml"
            fi
          fi

          echo "Path to spec resolved to $spec_path"

          if [ ! -f $spec_path ]; then
            echo "File $spec_path not found."
            exit 1
          fi

          echo "spec_path=$spec_path" >> "$GITHUB_OUTPUT"
      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.CI_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.CLOUD_RUN_ENDPOINT }}
          id_token_include_email: true
          create_credentials_file: false

      - name: Checkout linting rulesets
        uses: actions/checkout@v7
        with:
          repository: entur/api-guidelines
          ref: v3.0.3
          path: rulesets
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .spectral-required.yml

      - name: Validate
        shell: bash
        env:
          GHA_API_PATH: ${{ steps.resolve-spec-path.outputs.spec_path }}
          ID_TOKEN:     ${{ steps.auth.outputs.id_token }}
        run: |
          set -o errexit
          set -o nounset
          set -o pipefail
          shopt -s globstar

          echo "Validating spec: $GHA_API_PATH"

          echo "Linting with minimal ruleset..."
          if ! $SPECTRAL lint "$GHA_API_PATH" --ruleset "rulesets/.spectral-required.yml"; then
            echo "::error::Spec validation failed. Failing workflow."
            exit 1
          fi

          echo "Bundling..."
          filename=$(basename $GHA_API_PATH)
          mkdir -p /tmp/specs
          $REDOCLY bundle -o /tmp/specs/$filename $GHA_API_PATH

          # Extract repository name (without owner)
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          # Create metadata JSON
          METADATA="{\"repository\": \"$REPO_NAME\"}"

          echo "Uploading to api-spec-registry with dryRun=true..."

          RESPONSE=$(curl --fail-with-body -sS \
            -X PUT \
            -H "Authorization: Bearer $ID_TOKEN" \
            -F "metadata=$METADATA;type=application/json" \
            -F "spec=@/tmp/specs/$filename" \
            "$CLOUD_RUN_ENDPOINT?dryRun=true") || {
            DETAIL=$(echo "$RESPONSE" | jq -r '.detail')
            echo "::error file=$GHA_API_PATH,line=1::$DETAIL"
            exit 1
          }

          echo "Successfully validated: $GHA_API_PATH"
      - name: Send analytics
        if: always()
        uses: entur/gha-api/.github/actions/posthog@main
        with:
          workflow_name:   validate
          workflow_inputs: ${{ toJSON(inputs) }}
          api_key:         "phc_yhR5iXxjC2n6J7tqznFQURld147kruAy4HuYgjbyEyk"

