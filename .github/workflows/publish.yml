name: Entur/API/Publish

on:
  workflow_call:
    inputs:
      path:
        description: "Path to OpenAPI specfication"
        type: string
      artifact:
        description: "Artifact containing the OpenAPI specification."
        type: string

jobs:
  evaluate-input:
    name: Evaluate input
    runs-on: ubuntu-latest
    outputs:
      spec_path: ${{ steps.resolve-spec-path.outputs.spec_path }}
    steps:
      - name: Resolve spec path
        id: resolve-spec-path
        run: |
          # Resolve spec path based on inputs
          if [ -n "$GHA_API_ARTIFACT" ]; then
            if [ -n "$GHA_API_PATH" ]; then
              spec_path="/tmp/artifacts/$GHA_API_PATH"
            else
              spec_path="/tmp/artifacts/openapi.yaml"
            fi
          else
            if [ -n "$GHA_API_PATH" ]; then
              spec_path="$GHA_API_PATH"
            else
              spec_path="specs/openapi.yaml"
            fi
          fi
          
          echo "spec_path=$spec_path" >> "$GITHUB_OUTPUT"
  validate-spec:
    needs: evaluate-input
    name: Validate spec
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository (if spec provided)
        if: ${{ inputs.artifact == '' }}
        uses: actions/checkout@v6
      - name: Download artifact (if artifact provided)
        if: ${{ inputs.artifact != '' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact }}
          path: /tmp/artifact
      - name: Checkout linting rulesets
        uses: actions/checkout@v6
        with:
          repository: entur/api-guidelines
          ref: v2.2.3
          path: rulesets
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .spectral-required.yml
      - name: Validate spec
        shell: bash
        env:
          SPECTRAL_VERSION: "6.15.0"
          GHA_API_PATH:     ${{ needs.evaluate-input.outputs.spec_path }}
        run: |
          set -o errexit
          set -o nounset
          set -o pipefail          
          shopt -s globstar

          if ! npx @stoplight/spectral-cli@$SPECTRAL_VERSION lint "$GHA_API_PATH" --ruleset "rulesets/.spectral-required.yml"; then
            echo "::error::Spec validation failed. Failing workflow."
            exit 1
          fi  

  upload:
    name: Upload spec
    needs: [evaluate-input, validate-spec]
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    env:
      CLOUD_RUN_ENDPOINT: https://europe-west1-ent-apidata-prd.cloudfunctions.net/publish-spec
    steps:
      - name: Checkout repository (if spec provided)
        if: ${{ inputs.artifact == '' }}
        uses: actions/checkout@v6
      - name: Download artifact (if artifact provided)
        if: ${{ inputs.artifact != '' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact }}
          path: /tmp/artifact

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.CI_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.CLOUD_RUN_ENDPOINT }}
          id_token_include_email: true
          create_credentials_file: false

      - name: Upload
        env:
          GHA_API_PATH: ${{ needs.evaluate-input.outputs.spec_path }}
          ID_TOKEN:     ${{ steps.auth.outputs.id_token }}
        shell: bash
        run: |
          set -o errexit
          set -o nounset
          set -o pipefail
          shopt -s globstar

          # Extract repository name (without owner)
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          
          # Create metadata JSON
          METADATA="{\"repository\": \"$REPO_NAME\"}"

          echo "Publishing spec: $GHA_API_PATH"
              
          curl --fail-with-body -sS \
            -X PUT \
            -H "Authorization: Bearer $ID_TOKEN" \
            -F "metadata=$METADATA;type=application/json" \
            -F "spec=@$GHA_API_PATH" \
            "$CLOUD_RUN_ENDPOINT"
              
          echo "Successfully published: $GHA_API_PATH"
