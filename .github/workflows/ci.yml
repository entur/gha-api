name: Entur/API/CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  verify-pr:
    name: Verify PR
    if: ${{ github.event_name == 'pull_request' }}
    uses: entur/gha-meta/.github/workflows/verify-pr.yml@v1

  test-lint-file-fail-threshold-warn-ok:
    uses: ./.github/workflows/lint.yml
    with:
      path: fixture/openapi-good.json
      upload_to_bucket: false
      fail_threshold: warn

  test-lint-file-fail-threshold-error-ok:
    uses: ./.github/workflows/lint.yml
    with:
      path: fixture/openapi-good.json
      upload_to_bucket: false
      fail_threshold: error

  test-lint-file-warn:
    uses: ./.github/workflows/lint.yml
    with:
      path: fixture/openapi-warn.yaml
      upload_to_bucket: false
      fail_threshold: error

  test-lint-file-fail-threshold-never-ok:
    uses: ./.github/workflows/lint.yml
    with:
      path: fixture/openapi-bad.yaml
      upload_to_bucket: false
      fail_threshold: never

  test-validate-file-external-refs:
    uses: ./.github/workflows/validate.yml
    with:
      path: fixture/external-refs/openapi.yaml

  upload-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Save spec to the artifact storage
        uses: actions/upload-artifact@v7
        with:
          name: openapi
          path: fixture/openapi-good.json
          retention-days: 1
  # Lints the artifact uploaded in upload-artifact
  test-lint-artifact-ok:
    needs: upload-artifact
    uses: ./.github/workflows/lint.yml
    with:
      artifact: "openapi"
      path: "openapi-good.json"
      upload_to_bucket: false
      fail_threshold: warn

  upload-artifact-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Save all specs to the artifact storage
        uses: actions/upload-artifact@v7
        with:
          name: specs
          path: fixture/*
          retention-days: 1
  # Lints the artifact uploaded in upload-artifact
  test-lint-artifact-with-artifact_contents_glob-ok:
    needs: upload-artifact-all
    uses: ./.github/workflows/lint.yml
    with:
      artifact: "specs"
      path: "openapi-good.json"
      upload_to_bucket: false
      fail_threshold: warn

